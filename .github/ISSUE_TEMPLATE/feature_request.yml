name: Feature request
description: Suggest a new feature or improvement for Markagent
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Help me understand what you want and why.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain, not the solution. E.g. "I'm using Markagent with Cursor and X is slow because Y."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like Markagent to do?
      description: Your proposed solution, however rough.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds you've tried
      description: How are you currently working around this?
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - "Nice to have"
        - "Would use it often"
        - "Blocking my workflow"
    validations:
      required: true
