name: Integration request
description: Request support for a new AI coding agent, IDE, or platform
title: "[Integration] "
labels: ["integration", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Want Markagent to ship better prompts for a new AI tool? Tell me about it.

  - type: input
    id: tool-name
    attributes:
      label: Which AI tool / platform?
      placeholder: e.g. Aider, Continue, Replit Ghostwriter, Devin, Roo Code
    validations:
      required: true

  - type: input
    id: tool-url
    attributes:
      label: Tool website
      placeholder: https://...
    validations:
      required: false

  - type: textarea
    id: format
    attributes:
      label: What prompt format does it accept best?
      description: If you know its prompt conventions (Markdown, XML, specific tags, etc.), paste an example or link to docs.
    validations:
      required: false

  - type: textarea
    id: why
    attributes:
      label: Why this integration matters
      description: Your workflow, how big its community is, how often you'd use it.
    validations:
      required: false
